<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Pixel Hoverboard</title>
    <link
      id="favicon"
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cstyle%3E@keyframes spin %7B0%25%7Btransform:rotate(0deg)%7D100%25%7Btransform:rotate(360deg)%7D%7D@keyframes pulse %7B0%25,100%25%7Bopacity:1%7D50%25%7Bopacity:0.5%7D%7D.icon%7Banimation:spin 3s linear infinite%7D.center%7Banimation:pulse 1.5s ease-in-out infinite%7D%3C/style%3E%3Crect width='64' height='64' rx='12' fill='%231a1f2b'/%3E%3Cg class='icon' transform-origin='32 32'%3E%3Crect x='16' y='16' width='32' height='32' fill='none' stroke='%2300d2ff' stroke-width='3' rx='4'/%3E%3C/g%3E%3Ccircle cx='32' cy='32' r='5' class='center' fill='%2300d2ff'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <nav class="sidebar">
      <h2 class="sidebar-title">Controls</h2>
      
      <div class="control-group">
        <label class="control-label">X Axis: <span id="xValue">25</span></label>
        <input 
          type="range" 
          id="xSlider" 
          class="slider" 
          value="25" 
          min="5" 
          max="50"
        />
      </div>
      
      <div class="control-group">
        <label class="control-label">Y Axis: <span id="yValue">34</span></label>
        <input 
          type="range" 
          id="ySlider" 
          class="slider" 
          value="34" 
          min="5" 
          max="50"
        />
      </div>

      <div class="control-group">
        <p class="total-boxes">Total: <span id="totalBoxes">850</span></p>
      </div>
    </nav>

    <div class="main-wrapper">
      <h1 class="title">PIXEL HOVERBOARD</h1>
      <div class="container" id="container"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
